server:
  port: 8081

ring:
  profiles:
    active: h2
  threads:
    virtual:
      CC CCVBCVBGB C     HF : true
  jackson:
    property-naming-strategy: SNAKE_CASE
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@gmail.com
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

otp:
  expiration-minutes: 1
  max-attempts: 3
  code-length: 6

logging:
  level:
    com.fabiankevin.app: INFO

logbook:
  enabled: true
  format:
    style: http
  obfuscate:
    headers:
      - Authorization
      - X-Secret
    parameters:
      - password
      - token
  filter:
    enabled: true
  exclude:
    - /health
    - /metrics
    - /actuator/**
    - /swagger-ui/**
    - /v3/api-docs/**
  include:
    - /api/**
  conditions:
    methods:
      - GET
      - POST
    content-types:
      - application/json