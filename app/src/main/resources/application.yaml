server:
  port: 8081

spring:
  application:
    name: otp-service
  profiles:
    active: local-h2
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

management:
  endpoints:
    web:
      exposure:
        include: prometheus

otp:
  expiration-minutes: 1
  max-attempts: 3
  code-length: 6

logging:
  level:
    com.fabiankevin.app: INFO

logbook:
  format:
    style: http
  obfuscate:
    headers:
      - Authorization
      - X-Secret
    parameters:
      - password
      - token
  filter:
    enabled: true