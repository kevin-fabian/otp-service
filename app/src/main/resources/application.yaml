server:
  port: 8079

spring:
  application:
    name: otp-service
  profiles:
    active: local-postgres
  threads:
    virtual:
      enabled: true
  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail.smtp:
          auth: true
          starttls.enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jws-algorithms: RS256

management:
  endpoints:
    web:
      exposure:
        include: prometheus

otp:
  expiration-minutes: 5
  max-attempts: 3
  code-length: 6

totp:
  algorithm: SHA1
  digits: 6
  period-seconds: 30
  issuer: App Label

logging:
  level:
    com.fabiankevin.app: INFO

logbook:
  format:
    style: json
  obfuscate:
    headers:
      - Authorization
      - X-Secret
    parameters:
      - password
      - token
  filter:
    enabled: true
  predicate:
    include:
      - path: /v1/**
    exclude:
      - path: /actuator/**