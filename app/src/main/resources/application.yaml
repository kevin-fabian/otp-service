server:
  port: 8080

jasypt:
  encryptor:
    algorithm: PBEWithHmacSHA256AndAES_256
    password: ${JASYPT_ENCRYPTOR_PASSWORD}

spring:
  profiles:
    active: local
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

otp:
  expiration-minutes: 1
  max-attempts: 3
  code-length: 6

logging:
  level:
    com.fabiankevin.app: INFO