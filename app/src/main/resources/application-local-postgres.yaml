spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/otp_db?currentSchema=otp_user
    password: otp_apps
    username: otp_apps
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

logging:
  level:
    org.zalando.logbook: TRACE