<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .header {
            background-color: #007bff;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .content {
            padding: 20px;
            background-color: white;
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .otpTransaction-code {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            color: #007bff;
            padding: 20px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Your OTP Verification Code</h2>
    </div>
    <div class="content">
        <p>Please use the following code to verify your account:</p>
        <div class="otpTransaction-code" th:text="${otpCode}"></div>
        <p th:text="'This code will expire in ' + ${expirationMinutes} + ' minutes.'"></p>
    </div>
    <div class="footer">
        <p>This is a secure OTP. Do not share this code with anyone.</p>
        <p>&copy; 2025 Your Company. All rights reserved.</p>
    </div>
</div>
</body>
</html>
