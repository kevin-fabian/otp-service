spring:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.github.fabiankevin: DEBUG
    com.fabiankevin.app: DEBUG
    org:springframework:security: DEBUG
    org.springframework.web.client.RestClient: DEBUG

management:
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false